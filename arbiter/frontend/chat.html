<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbiter — AI Governance Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
:root{
  --bg:#141210;--bg2:#1b1916;--bg3:#231f1c;--bg4:#2d2824;
  --border:#3a332d;--border2:#4d443c;
  --text:#f0ece6;--text2:#b8b0a4;--text3:#7a7068;
  --amber:#e5a93e;--amber-bg:rgba(229,169,62,.08);--amber-border:rgba(229,169,62,.2);--amber-glow:rgba(229,169,62,.12);
  --gold:#c89b3c;
  --emerald:#4ade80;--emerald-bg:rgba(74,222,128,.06);--emerald-border:rgba(74,222,128,.18);
  --coral:#fb7185;--coral-bg:rgba(251,113,133,.06);--coral-border:rgba(251,113,133,.18);
  --sky:#38bdf8;--sky-bg:rgba(56,189,248,.06);--sky-border:rgba(56,189,248,.18);
  --violet:#a78bfa;--violet-bg:rgba(167,139,250,.05);--violet-border:rgba(167,139,250,.18);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,.06);--teal-border:rgba(45,212,191,.18);
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
.code{font-family:'Fira Code',monospace}
::selection{background:var(--amber);color:var(--bg)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.login-wrap .bg-grain{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");opacity:.6}
.login-wrap .glow-orb{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(229,169,62,.06) 0%,transparent 70%);top:40%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px 32px 28px;width:440px;position:relative;z-index:1;animation:fadeIn .5s ease;box-shadow:0 20px 60px rgba(0,0,0,.5)}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.login-card .brand{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.login-card .brand .mark{width:36px;height:36px;background:linear-gradient(135deg,var(--amber),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--bg);font-family:'Fira Code',monospace}
.login-card .brand h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.login-card .brand h1 span{color:var(--amber)}
.login-card .brand .ver{font-size:9px;color:var(--text3);font-family:'Fira Code',monospace;margin-left:auto}
.login-card .sub{font-size:11px;color:var(--text3);margin-bottom:18px;line-height:1.5}
.role-list{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.role-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s}
.role-item:hover{border-color:var(--amber-border);background:var(--amber-bg)}
.role-item .ri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.role-item .ri-name{font-size:12px;font-weight:600;flex:1}
.role-item .ri-scope{font-size:9px;color:var(--text3);font-family:'Fira Code',monospace}
.ri-dot.coral{background:var(--coral)}.ri-dot.amber{background:var(--amber)}.ri-dot.sky{background:var(--sky)}.ri-dot.violet{background:var(--violet)}.ri-dot.teal{background:var(--teal)}
.login-sep{display:flex;align-items:center;gap:10px;margin:12px 0}.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--border)}.login-sep span{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}
.login-row{display:flex;gap:6px}
.login-row input{flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;outline:none}
.login-row input:focus{border-color:var(--amber)}.login-row input::placeholder{color:var(--text3)}
.login-go{padding:8px 16px;background:var(--amber);border:none;border-radius:6px;color:var(--bg);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.login-go:hover{opacity:.9}
.login-err{color:var(--coral);font-size:10px;margin-top:6px;min-height:14px}
.app{height:100vh;display:grid;grid-template-columns:1fr 300px;grid-template-rows:44px 1fr}
.app.no-panel{grid-template-columns:1fr 0}
.top{grid-column:1/-1;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);background:var(--bg2);gap:8px}
.top .brand-sm{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.top .brand-sm span{color:var(--amber)}
.top .live{width:6px;height:6px;background:var(--emerald);border-radius:50%;box-shadow:0 0 6px rgba(74,222,128,.5);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.tag{font-family:'Fira Code',monospace;font-size:8px;padding:2px 7px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase;font-weight:500}
.tag-admin{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-border)}
.tag-teacher{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.tag-advisor{background:var(--sky-bg);color:var(--sky);border:1px solid var(--sky-border)}
.tag-student{background:var(--violet-bg);color:var(--violet);border:1px solid var(--violet-border)}
.tag-ta{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.top .fill{flex:1}
.top .meta{font-size:8px;color:var(--text3);font-family:'Fira Code',monospace}
.top-btn{font-size:9px;font-weight:600;padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text3);cursor:pointer;transition:all .12s;text-decoration:none;font-family:inherit}
.top-btn:hover{border-color:var(--amber-border);color:var(--text);background:var(--amber-bg)}
.chat-col{display:flex;flex-direction:column;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.welcome-banner{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:10px;padding:14px 16px;animation:fadeIn .4s ease}
.welcome-banner .wb-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.welcome-banner .wb-icon{font-size:16px}
.welcome-banner .wb-name{font-size:13px;font-weight:700;color:var(--amber)}
.welcome-banner .wb-body{font-size:11px;color:var(--text2);line-height:1.6}
.welcome-banner .wb-access{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.welcome-banner .wb-tag{font-family:'Fira Code',monospace;font-size:8px;padding:2px 6px;border-radius:3px}
.wb-tag.allowed{background:var(--emerald-bg);color:var(--emerald);border:1px solid var(--emerald-border)}
.wb-tag.denied{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-border)}
.wb-tag.masked{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.m{max-width:85%;animation:mIn .25s ease}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.m.u{align-self:flex-end}.m.a{align-self:flex-start}
.m-time{font-size:8px;color:var(--text3);margin-bottom:2px;font-family:'Fira Code',monospace}
.m.u .m-time{text-align:right}
.m-body{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65}
.m.u .m-body{background:var(--amber-bg);border:1px solid var(--amber-border)}
.m.a .m-body{background:var(--bg3);border:1px solid var(--border);position:relative}
.m.a .m-body p{margin:0 0 6px}.m.a .m-body p:last-child{margin:0}
.m.a .m-body strong{color:var(--text);font-weight:600}
.m.a .m-body code{background:var(--bg4);padding:1px 5px;border-radius:3px;font-size:11px;font-family:'Fira Code',monospace}
.m.a .m-body ul,.m.a .m-body ol{margin:4px 0 6px 16px}.m.a .m-body li{margin:2px 0}
.m-footer{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.mt{font-family:'Fira Code',monospace;font-size:7px;padding:2px 5px;border-radius:3px;letter-spacing:.2px}
.mt.ok{background:var(--emerald-bg);color:var(--emerald);border:1px solid var(--emerald-border)}
.mt.warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.mt.bad{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-border)}
.mt.info{background:var(--sky-bg);color:var(--sky);border:1px solid var(--sky-border)}
.mt.dim{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.m-gov{font-size:7px;color:var(--text3);font-family:'Fira Code',monospace;margin-left:auto;opacity:.5}
.typing{align-self:flex-start;display:flex;gap:3px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px}
.td{width:5px;height:5px;background:var(--text3);border-radius:50%;animation:tp 1.4s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.15)}}
.chips{display:flex;gap:5px;flex-wrap:wrap;padding:0 18px 8px}
.chip{font-size:10px;padding:5px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;cursor:pointer;color:var(--text2);transition:all .12s}
.chip:hover{border-color:var(--amber-border);color:var(--text);background:var(--amber-bg)}
.input-row{padding:10px 18px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px}
.input-row textarea{flex:1;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;outline:none;resize:none;min-height:38px;max-height:100px;line-height:1.5}
.input-row textarea:focus{border-color:var(--amber)}.input-row textarea::placeholder{color:var(--text3)}
.go{padding:9px 16px;background:var(--amber);border:none;border-radius:var(--r);color:var(--bg);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
.go:hover{box-shadow:0 4px 12px var(--amber-glow)}.go:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.empty{color:var(--text3);font-size:11px;text-align:center;padding:60px 20px;line-height:1.8}
.empty .icon{font-size:28px;margin-bottom:6px;opacity:.25}
.panel{border-left:1px solid var(--border);background:var(--bg2);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
.app.no-panel .panel{display:none}
.pt{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.pb{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 9px;font-size:10px}
.pb h5{font-size:8px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.pb .row{display:flex;justify-content:space-between;margin-bottom:2px;color:var(--text3)}
.pb .row .val{color:var(--text2);font-family:'Fira Code',monospace;font-size:8px;text-align:right;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.steps{display:flex;flex-direction:column;gap:1px}
.step{display:flex;align-items:center;gap:6px;padding:3px 4px;border-radius:3px;font-size:9px;color:var(--text3)}
.step .sd{width:4px;height:4px;border-radius:50%;background:var(--border);transition:all .3s}
.step.ok .sd{background:var(--emerald);box-shadow:0 0 4px rgba(74,222,128,.3)}
.step.warn .sd{background:var(--amber);box-shadow:0 0 4px var(--amber-glow)}
.step.err .sd{background:var(--coral);box-shadow:0 0 4px rgba(251,113,133,.3)}
.step .sn{flex:1}.step .sv{font-family:'Fira Code',monospace;font-size:7px}
.ii{padding:4px 6px;background:var(--sky-bg);border:1px solid var(--sky-border);border-radius:4px;margin-bottom:2px;font-size:8px}
.ii .id{font-weight:600;color:var(--sky);font-family:'Fira Code',monospace}.ii .nm{color:var(--text3);margin-top:1px}.ii .wh{color:var(--amber);font-family:'Fira Code',monospace;font-size:7px}
.vi{padding:4px 6px;background:var(--coral-bg);border:1px solid var(--coral-border);border-radius:4px;margin-bottom:2px;font-size:8px}
.vi .vt{font-weight:600;color:var(--coral);text-transform:uppercase;font-size:7px}.vi .vd{color:var(--text3);margin-top:1px}
.cqi{padding:4px 6px;background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.25);border-radius:4px;margin-bottom:2px;font-size:8px}
.cqi .cqi-id{font-weight:600;color:var(--coral);font-family:'Fira Code',monospace}.cqi .cqi-desc{color:var(--text3);margin-top:1px}
.toasts{position:fixed;top:52px;right:16px;z-index:100;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.toast{padding:7px 12px;border-radius:6px;font-size:10px;font-family:'Fira Code',monospace;animation:tIn .3s ease,tOut .3s ease 3s forwards;max-width:320px;box-shadow:0 8px 20px rgba(0,0,0,.4);pointer-events:auto}
.toast.t-info{background:var(--bg2);border:1px solid var(--sky-border);color:var(--sky)}
.toast.t-warn{background:var(--bg2);border:1px solid var(--coral-border);color:var(--coral)}
.toast.t-ok{background:var(--bg2);border:1px solid var(--emerald-border);color:var(--emerald)}
@keyframes tIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0}}
@media(max-width:860px){.app{grid-template-columns:1fr}.panel{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toasts" id="toasts"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
marked.setOptions({breaks:true,gfm:true});

const CHIPS={
  Admin:["Show me all financial records","Which students are on academic probation?","Full budget breakdown","List all faculty salaries"],
  Teacher:["Show me grades for my classes","What is my salary?","CS department budget and faculty count","Show academic standing"],
  Advisor:["Academic standing for my advisees","Grades for my advisees","Department budget","Advisees needing attention"],
  Student:["What is my tuition balance?","My academic standing","What classes am I in?","Department budgets"],
  TA:["Grades for my assigned class","What do I TA for?","Department budgets","My tuition status"]
};
const SCOPES={Admin:"Full-Access",Teacher:"Dept-Scoped",Advisor:"Advisee-Scoped",Student:"Self-Scoped",TA:"Course-Scoped"};
const ROLE_META={
  Admin:{dot:"coral",allowed:["persons","financial","grades","classes","departments","standing"],denied:[],desc:"Full access to all resources across the institution."},
  Teacher:{dot:"amber",allowed:["persons","grades (own classes)","classes","departments","financial (own)"],denied:["academic_standing","other salaries"],desc:"Access scoped to your department. Grade access limited to classes you teach."},
  Advisor:{dot:"sky",allowed:["persons","grades (advisees)","classes","departments","financial (own)"],denied:["academic_standing","other salaries"],desc:"Access scoped to your advisees. Standing access via advisor relationship."},
  Student:{dot:"violet",allowed:["persons","financial (own)","classes","standing (own)"],denied:["grades","departments","other financial"],desc:"Self-scoped access only. You can view your own records but not others'."},
  TA:{dot:"teal",allowed:["persons","grades (assigned courses)","classes","financial (own)","standing (own)"],denied:["departments","other grades"],desc:"Course-scoped access. Grade access limited to your assigned courses."}
};

function toast(type,msg){const c=document.getElementById('toasts');const t=document.createElement('div');t.className='toast t-'+type;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3400)}
function timeStr(){return new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}
function fmtDur(s){const m=Math.floor(s/60);const sec=s%60;return m+'m '+sec+'s'}

function LoginScreen({onLogin}){
  const[roles,setRoles]=useState([]);const[err,setErr]=useState('');const uRef=useRef(),pRef=useRef();
  useEffect(()=>{fetch('/demo/roles').then(r=>r.json()).then(d=>setRoles(d.roles)).catch(()=>{})},[]);
  const login=async(u,p)=>{setErr('');const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});if(!r.ok){setErr('Invalid credentials');return}onLogin(await r.json())};
  return <div className="login-wrap">
    <div className="bg-grain"/><div className="glow-orb"/>
    <div className="login-card">
      <div className="brand"><div className="mark">A</div><h1><span>Arbiter</span></h1><div className="ver">v3.0</div></div>
      <div className="sub">Control what AI sees. Verify what AI says.</div>
      <div className="role-list">
        {roles.map(r=>{const m=ROLE_META[r.role]||{dot:'amber'};return <div key={r.username} className="role-item" onClick={()=>login(r.username,r.username)}>
          <div className={'ri-dot '+m.dot}/><div className="ri-name">{r.label}</div><div className="ri-scope">{r.role}</div>
        </div>})}
      </div>
      <div className="login-sep"><span>credentials</span></div>
      <div className="login-row"><input ref={uRef} placeholder="username"/><input ref={pRef} type="password" placeholder="password"/><button className="login-go" onClick={()=>login(uRef.current.value,pRef.current.value)}>→</button></div>
      <div className="login-err">{err}</div>
    </div>
  </div>
}

function WelcomeBanner({session}){
  const m=ROLE_META[session.role]||{allowed:[],denied:[],desc:''};
  return <div className="welcome-banner">
    <div className="wb-head"><span className="wb-icon">⬡</span><span className="wb-name">Welcome, {session.label}</span></div>
    <div className="wb-body">{m.desc}<br/>Logged in as <strong>{session.role}</strong> ({SCOPES[session.role]}) · SSN masking active · All queries audited.</div>
    <div className="wb-access">
      {m.allowed.map((a,i)=><span key={'a'+i} className="wb-tag allowed">✓ {a}</span>)}
      {m.denied.map((d,i)=><span key={'d'+i} className="wb-tag denied">✗ {d}</span>)}
      <span className="wb-tag masked">⦿ SSN masked</span>
    </div>
  </div>
}

function PipelinePanel({data}){
  const steps=['Identity','ABAC','Query intent','Inference','Data filter','LLM call','Output scan'];
  if(!data)return <div className="panel"><div className="pt">Governance Pipeline</div><div className="pb"><div style={{color:'var(--text3)',fontSize:10,textAlign:'center',padding:'16px 0'}}>Send a query to see the pipeline</div></div></div>;
  const inf=data.inference_channels_blocked||[];const viol=data.output_violations||[];const cqv=data.cross_query_violations||[];
  return <div className="panel">
    <div className="pt">Governance Pipeline</div>
    <div className="pb"><h5>Steps</h5><div className="steps">
      {steps.map((s,i)=>{let cls='step ok';if(i===3&&(inf.length>0||cqv.length>0))cls='step warn';if(i===6&&data.output_decision==='blocked')cls='step err';else if(i===6&&data.output_decision==='redacted')cls='step warn';
      return <div key={i} className={cls}><div className="sd"/><div className="sn">{s}</div><div className="sv">{i===5&&data._elapsed?data._elapsed+'ms':'✓'}</div></div>})}
    </div></div>
    <div className="pb"><h5>Access</h5>
      <div className="row"><span>Level</span><span className="val">{data.access_level?.toUpperCase()}</span></div>
      <div className="row"><span>Denied</span><span className="val">{data.denied_resources?.join(', ')||'none'}</span></div>
      <div className="row"><span>Masked</span><span className="val">{data.masked_fields?.join(', ')||'none'}</span></div>
      <div className="row"><span>Trace</span><span className="val">{data.trace_id}</span></div>
    </div>
    {data.query_intent&&<div className="pb"><h5>Query Intent</h5>
      <div className="row"><span>Category</span><span className="val">{data.query_intent.category}</span></div>
      <div className="row"><span>Resources</span><span className="val">{(data.query_intent.effective_resources||[]).join(', ')}</span></div>
      <div className="row"><span>Confidence</span><span className="val">{Math.round((data.query_intent.confidence||0)*100)}%</span></div>
    </div>}
    {inf.length>0&&<div className="pb"><h5>Inference Blocked ({inf.length})</h5>
      {inf.map((ch,i)=><div key={i} className="ii"><div className="id">{ch.channel_id}</div><div className="nm">{ch.name}</div><div className="wh">withheld: {ch.withheld_field}</div></div>)}
    </div>}
    {cqv.length>0&&<div className="pb"><h5>Cross-Query Inference ({cqv.length})</h5>
      {cqv.map((cv,i)=><div key={i} className="cqi"><div className="cqi-id">{cv.channel_id}</div><div className="cqi-desc">{cv.description}</div></div>)}
    </div>}
    <div className="pb"><h5>Output Scan</h5>
      <div className="row"><span>Decision</span><span className="val">{data.output_decision?.toUpperCase()}</span></div>
      {viol.map((v,i)=><div key={i} className="vi"><div className="vt">{v.type}</div><div className="vd">{v.description}</div></div>)}
    </div>
  </div>
}

function ChatScreen({session,onLogout}){
  const[msgs,setMsgs]=useState([]);
  const[loading,setLoading]=useState(false);
  const[panelData,setPanelData]=useState(null);
  const[panelOpen,setPanelOpen]=useState(true);
  const[elapsed,setElapsed]=useState(0);
  const[queryCount,setQueryCount]=useState(0);
  const inputRef=useRef();const msgsEnd=useRef();const startTime=useRef(Date.now());
  const chips=CHIPS[session.role]||[];

  useEffect(()=>{const iv=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime.current)/1000)),1000);return()=>clearInterval(iv)},[]);
  const autoResize=useCallback((e)=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,100)+'px'},[]);
  const scroll=()=>setTimeout(()=>msgsEnd.current?.scrollIntoView({behavior:'smooth'}),50);

  const send=async(text)=>{
    const msg=text||(inputRef.current?.value||'').trim();if(!msg)return;
    if(inputRef.current){inputRef.current.value='';inputRef.current.style.height='auto'}
    setMsgs(p=>[...p,{type:'user',text:msg,time:timeStr()}]);
    setLoading(true);scroll();
    const t0=performance.now();
    try{
      const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:session.user_id,role:session.role,message:msg})});
      const d=await r.json();
      d._elapsed=Math.round(performance.now()-t0);
      setMsgs(p=>[...p,{type:'ai',data:d,time:timeStr()}]);
      setPanelData(d);setQueryCount(c=>c+1);
      if(d.inference_channels_blocked?.length)d.inference_channels_blocked.forEach(ch=>toast('info','🔗 '+ch.channel_id+': '+ch.name));
      if(d.output_violations?.length)d.output_violations.forEach(v=>toast('warn','⚠ '+v.type));
      if(d.cross_query_violations?.length)d.cross_query_violations.forEach(cv=>toast('warn','🔗 MULTI-TURN: '+cv.name));
      if(d.cross_query_alert)toast('warn',d.cross_query_alert);
      if(d.output_decision==='clean'&&!d.inference_channels_blocked?.length&&!d.cross_query_violations?.length)toast('ok','✓ Clean pass');
    }catch(e){setMsgs(p=>[...p,{type:'ai',data:{response:'Error: '+e.message,access_level:'error',output_decision:'error',denied_resources:[],masked_fields:[],inference_channels_blocked:[],output_violations:[],cross_query_violations:[],trace_id:'—',_elapsed:0},time:timeStr()}])}
    setLoading(false);scroll();
  };

  const clearChat=()=>{setMsgs([]);setPanelData(null)};
  const tagClass=(al)=>al==='full'?'ok':al==='partial'?'warn':'bad';
  const outClass=(od)=>od==='clean'?'ok':od==='blocked'?'bad':'warn';

  return <div className={'app'+(panelOpen?'':' no-panel')}>
    <div className="top">
      <div className="brand-sm"><div className="live"/>&nbsp;<span>Arbiter</span></div>
      <div className={'tag tag-'+session.role.toLowerCase()}>{session.role}</div>
      <div className="meta">{session.label}</div>
      <div className="fill"/>
      <div className="meta">Session: {fmtDur(elapsed)}</div>
      <div className="meta">{queryCount} queries</div>
      <button className="top-btn" onClick={clearChat}>Clear</button>
      <button className="top-btn" onClick={()=>setPanelOpen(p=>!p)}>Pipeline</button>
      <a className="top-btn" href="/demo">Demo</a>
      <a className="top-btn" href="/admin">Admin</a>
      <button className="top-btn" onClick={onLogout}>Logout</button>
    </div>
    <div className="chat-col">
      <div className="msgs">
        {msgs.length===0&&<><WelcomeBanner session={session}/><div className="empty"><div className="icon">⬡</div>Ask a question or select a suggestion below.</div></>}
        {msgs.map((m,i)=>m.type==='user'
          ?<div key={i} className="m u"><div className="m-time">{m.time}</div><div className="m-body">{m.text}</div></div>
          :<div key={i} className="m a">
            <div className="m-time">{m.time}</div>
            <div className="m-body" dangerouslySetInnerHTML={{__html:marked.parse(m.data.response||'')}}/>
            <div className="m-footer">
              <span className={'mt '+tagClass(m.data.access_level)}>{m.data.access_level}</span>
              {(m.data.inference_channels_blocked||[]).length>0&&<span className="mt info">{m.data.inference_channels_blocked.length} inference</span>}
              {(m.data.cross_query_violations||[]).length>0&&<span className="mt bad">{m.data.cross_query_violations.length} cross-query</span>}
              <span className={'mt '+outClass(m.data.output_decision)}>out: {m.data.output_decision}</span>
              <span className="mt dim">{m.data._elapsed}ms</span>
              <span className="mt dim">{m.data.trace_id}</span>
              <span className="m-gov">governed by arbiter</span>
            </div>
          </div>
        )}
        {loading&&<div className="typing"><div className="td"/><div className="td"/><div className="td"/></div>}
        <div ref={msgsEnd}/>
      </div>
      <div className="chips">{chips.map((c,i)=><div key={i} className="chip" onClick={()=>send(c)}>{c}</div>)}</div>
      <div className="input-row">
        <textarea ref={inputRef} placeholder="Ask a question..." rows="1" onInput={autoResize} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}}/>
        <button className="go" disabled={loading} onClick={()=>send()}>Send</button>
      </div>
    </div>
    <PipelinePanel data={panelData}/>
  </div>
}

function App(){
  const[session,setSession]=useState(null);
  const logout=async()=>{if(session)fetch('/logout?session_id='+session.session_id,{method:'POST'}).catch(()=>{});setSession(null)};
  if(!session)return <LoginScreen onLogin={setSession}/>;
  return <ChatScreen session={session} onLogout={logout}/>;
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
